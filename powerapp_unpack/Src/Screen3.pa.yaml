Screens:
  Screen3:
    Children:
      - ScreenContainer2:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - HeaderContainer2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =75
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                Children:
                  - Header2:
                      Control: Header@0.0.44
                      Properties:
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        Title: ="Header"
            - MainContainer2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =Parent.Fill
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutMaxHeight: =
                  LayoutMaxWidth: =
                  LayoutWrap: =true
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Width: =1000
                Children:
                  - Gallery1:
                      Control: Gallery@2.15.0
                      Variant: Vertical
                      Properties:
                        AccessibleLabel: ="Items gallery"
                        LayoutMaxHeight: =
                        LayoutMaxWidth: =
                        TabIndex: =0
                        TemplatePadding: =0
                        TemplateSize: =320
                        Transition: =Transition.Pop
                        WrapCount: =If(Screen3.Size = ScreenSize.ExtraLarge , 3, Screen3.Size = ScreenSize.Large, 2, 1)
                      Children:
                        - GalleryContainer1:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =RGBA(255, 255, 255, 1)
                              Height: =308
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutJustifyContent: =LayoutJustifyContent.Center
                              LayoutOverflowY: =LayoutOverflow.Scroll
                              Width: =If(Screen3.Size = ScreenSize.ExtraLarge, (Parent.Width / 3) - 15, Screen3.Size = ScreenSize.Large, (Parent.Width / 2) - 15 , Parent.Width)
                              X: =5
                              Y: =5
                            Children:
                              - ImageContainer2:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    FillPortions: =1.5
                                    LayoutAlignItems: =LayoutAlignItems.Stretch
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =5
                                    LayoutJustifyContent: =LayoutJustifyContent.End
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinWidth: =Parent.Width
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                    Width: =Parent.Width
                                  Children:
                                    - Image15:
                                        Control: Image@2.2.3
                                        Properties:
                                          FillPortions: =1
                                          ImagePosition: =ImagePosition.Fill
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          Width: =Parent.Width
                              - TitleContainer2:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Center
                                    DropShadow: =DropShadow.None
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =8
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    LayoutMinWidth: =GalleryContainer1.Width
                                    PaddingBottom: =20
                                    PaddingLeft: =20
                                    PaddingRight: =20
                                    PaddingTop: =20
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                    Width: =Parent.Width
                                  Children:
                                    - TitleText1:
                                        Control: Text@0.0.51
                                        Properties:
                                          Height: =30
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          LayoutMinWidth: =Parent.Width
                                          Size: =16
                                          Text: ="Featured item"
                                          VerticalAlign: =VerticalAlign.Top
                                          Weight: ='TextCanvas.Weight'.Bold
                                          Width: =Parent.Width - TitleContainer2.PaddingLeft
                                    - DescriptionText2:
                                        Control: Text@0.0.51
                                        Properties:
                                          Height: =45
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          LayoutMinWidth: =Parent.Width
                                          Size: =16
                                          Text: ="Short description or engaging message"
                                          VerticalAlign: =VerticalAlign.Top
                                          Width: =Parent.Width - TitleContainer2.PaddingLeft
                              - ButtonContainer1:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    AlignInContainer: =AlignInContainer.SetByContainer
                                    DropShadow: =DropShadow.None
                                    FillPortions: =0
                                    Height: =50
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutMaxHeight: =
                                    LayoutMaxWidth: =
                                    PaddingBottom: =12
                                    PaddingLeft: =20
                                    PaddingRight: =20
                                    PaddingTop: =8
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                    Width: =Parent.Width
                                  Children:
                                    - Button1:
                                        Control: Button@0.0.45
                                        Properties:
                                          AccessibleLabel: ="Featured item button"
                                          Appearance: ='ButtonCanvas.Appearance'.Secondary
                                          LayoutMaxHeight: =
                                          LayoutMaxWidth: =
                                          Width: =110
