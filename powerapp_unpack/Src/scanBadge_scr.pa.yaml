            - ReportCkInTimer:
                Control: Timer@2.1.0
                Properties:
                  AutoPause: =false
                  AutoStart: =true
                  Duration: =1800000
                  Height: =47
                  OnTimerEnd: =
                  OnTimerStart: |-
                    =Set(varMessage,LookUp('Communication Stream to Apps',_AppName=AppName));


                    Set(
                        varUserDetails,
                        Office365Users.UserProfileV2(User().Email)
                    );
                    Set(
                        varUserEmail,
                        {
                            '@odata.type': "#Microsoft.Azure.Connectors.SharePoint.SPListExpandedUser",
                            Claims: "i:0#.f|membership|" & User().Email,
                            DisplayName: User().FullName,
                            Department: varUserDetails.department,
                            JobTitle: varUserDetails.jobTitle,
                            Picture: Office365Users.UserPhotoV2(User().Email),
                            Email: User().Email
                        }
                    );
                    Set(
                        varNow,
                        Now()
                    );
                    Set(
                        varLocation,
                        LookUp(
                            Stations,
                            EmailTest = User().Email,
                            'Machine No'
                        )
                    );
                    Set(
                        varExisting,
                        LookUp(
                            'Running Apps Check In',
                            Title = varLocation
                        )
                    );
                    If(
                        !IsBlank(varExisting),
                        Patch(
                            'Running Apps Check In',
                            varExisting,
                            {
                                'Last Check In': varNow,
                                'User Email': varUserEmail,
                                'App ID':_AppID,
                                'App Name':_AppName,
                                'App Version':_AppVerison
                            }
                        ),
                        Patch(
                            'Running Apps Check In',
                            Defaults('Running Apps Check In'),
                            {
                                Title: varLocation,
                                'Last Check In': varNow,
                                'User Email': varUserEmail,
                                'App ID':_AppID,
                                'App Name':_AppName,
                                'App Version':_AppVerison
                            }
                        )
                    )
                  Repeat: =true
                  Size: =10
                  Text: ="Running CkIn " & Text(Time(0, 0, Self.Value/1000), "hh:mm:ss")
                  Width: =103
                  X: =11
                  Y: =200
