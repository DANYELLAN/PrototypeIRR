Screens:
  Screen2:
    Children:
      - ReFreshByTimer:
          Control: Timer@2.1.0
          Properties:
            AutoPause: =false
            Duration: =1000
            Height: =32
            OnTimerEnd: |-
              =
              Refresh('Ennis Start and Stop Time Inputs');
              ClearCollect(
                  colEnnisStartStop,
                  Filter(
                      'Ennis Start and Stop Time Inputs',
                      Submitted = false
                  )
              );
              ClearCollect(
                  colEnnisTimeEntry,
                  FirstN(
                      Sort(
                          'Ennis Machinist Time Entry',
                          LaborDate,
                          SortOrder.Descending
                      ),
                      300
                  )
              );
              ClearCollect(
                  colENTimeCombined,
                  AddColumns(
                      colEnnisStartStop,
                      Source,
                      "In Progress"
                  ),
                  AddColumns(
                      colEnnisTimeEntry,
                      Source,
                      "Submitted"
                  )
              );
              ClearCollect(
                  colFilEmpStartStop,
                  Filter(
                      colENTimeCombined,
                      EmpID = Value(varUserRecord.EmpID)
                  )
              );
              Set(
                  varRunReFresh,
                  false
              );
              Set(
                  varRunReSet,
                  true
              );
              Set(
                  callSpinner,
                  false
              );
              /*Notify(
                  "Timer Collect Ended",
                  NotificationType.Success,
                  2000
              );*/


              /*
              Switch(varTriggerScr,1,
                  Navigate(
                      home_scr,
                      ScreenTransition.Fade
                  ));
                  Set(varTriggerScr,Blank())*/
            OnTimerStart: |-
              =Set(callSpinner,true);

              /*Notify(
                  "Timer Collect Started",
                  NotificationType.Information,
                  2000
              );*/
            Reset: =varRunReSet
            Size: =8
            Start: =varRunReFresh
            Text: |-
              ="Runs Machinist Time Update"
              //Text(Time(0, 0, Self.Value/1000), "hh:mm:ss")
            Width: =247
            X: =12
            Y: =40
      - ButtonCanvas31:
