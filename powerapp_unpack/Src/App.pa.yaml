App:
  Properties:
    Formulas: |+
      =_AppName = "Ennis CNC Time Entry";
      _AppID = "8250839b-f712-465e-877f-9bad5b828fcf";
      _AppVerison ="764";
      varMainFill=RGBA(27,28,48,1);
      varMainFill2=RGBA(49,49,87,0.50);
      varMainFill3=RGBA(53,60,71,1);
      _Hours=["00","01","02","03","04","05","06","07","08","09","10","11","12","13","14","15","16"];
      _Minutes=["00","05","10","15","20","25","30","35","40","45","50","55"];
      _Shifts = [{Branch:"Ennis",ID:40,OptionStep:1,Title:"Day Shift"},{ Branch:"Ennis",ID:41,OptionStep:1,Title:"Night Shift"}];
      _HeaderButtons = [{Title: "Exit",icon:Icon.Leave},{Title:"Time Input",icon:Icon.Database},{Title:"Misc Time",icon:Icon.Clock},{Title:"Manual Time",icon:Icon.Clock},{Title:"Clean",icon:Icon.ClearDrawing},{Title:"Refresh",icon:Icon.Sync},{Title:"Settings",icon:Icon.Settings}];



    OnStart: |-
      =Set(timersRun,true);


      ClearCollect(
          colProductionOperations,
          Filter(
              'Production Operations',
              OrderType = "EN" 
          )
      );
      Set(
          signIN,
          false
      );
      Set(
          varADPIn,
          Blank()
      );
      ClearCollect(
          colUsers,
          RenameColumns(
              ShowColumns(
                  Filter(
                      Employees,
                      Status = "Active" && Branches = "Ennis" && Machinist = true
                  ),
                  ADPEmpNumber,
                  'First Name',
                  'Last Name',
                  'Full Name',
                  Branches
              ),
              field_0,
              EmpID,
              field_2,
              'First Name',
              field_4,
              'Last Name',
              Title,
              'Full Name',
              field_22,
              Branch
          )
      );
      ClearCollect(
          varDetails,
          ShowColumns(
              Filter(
                  AddColumns(
                      'Details Type',
                      BranchValue,
                      Branch.Value
                  ),
                  BranchValue = "Ennis"
              ),
              ID,
              OptionStep,
              Title,
              TypeII,
              BranchValue
          )
      );
      ClearCollect(
          _RadioChoices,
          _Shifts,
          RenameColumns(
              varDetails,
              BranchValue,
              Branch
          )
      );
      ClearCollect(
          colStations,
          Stations
      );
      Set(
          varUsersLocation,
          "Ennis"
      );

      Set(
          _off365Acct,
          Office365Users.UserProfileV2(User().EntraObjectId).jobTitle
      );
      If(
          IsBlank(_off365Acct),
          Set(
              varMachineNo,
              LookUp(
                  colStations,
                  EmailTest = User().Email,
                  'Machine No'
              )
          ),
          Set(
              varMachineNo,
              _off365Acct
          )
      );
      ClearCollect(
          colPOrders,
          Filter(
              'Production Order Acu Export',
              ('Order Type' = "EN" || 'Order Type' = "RD") && (Status = "In Process" || Status = "Released" || Status = "Planned")
          )
      );
      ClearCollect(
          colEnnisStartStop,
          'Ennis Start and Stop Time Inputs'
      );
      ClearCollect(
          colEnnisTimeEntry,
          FirstN(
              Sort(
                  'Ennis Machinist Time Entry',
                  LaborDate,
                  SortOrder.Descending
              ),
              300
          )
      );
      ClearCollect(
          colENTimeCombined,
          AddColumns(
              colEnnisStartStop,
              Source,
              "Input"
          ),
          AddColumns(
              colEnnisTimeEntry,
              Source,
              "Final"
          )
      );
      ClearCollect(
          colFilEmpStartStop,
          Filter(
              colENTimeCombined,
              Value(EmpID) = Value(varCurrentBadge)
          )
      );
      ClearCollect(
          colSOP,
          'Standard Operating Procedures'
      );
      Set(timersRun,false);

      Set(varStartDate, DateAdd(Today(), -1, TimeUnit.Days));
      Set(varEndDate, DateAdd(Today(), 1, TimeUnit.Days));
      Set(varLastDate,DateAdd(Today(), -1, TimeUnit.Days));

      /*ClearCollect(
          CombinedData,
          [
              "Shop Time",
              "Set Up Time"
          ],
          Distinct(
              Filter(
                  'Production Operations_1',
                  Status = "In Process" && StartsWith(
                      ProductionNumber,
                      "ewo"
                  )
              ),
              ProductionNumber
          )
      );*/
    Theme: =PowerAppsTheme
