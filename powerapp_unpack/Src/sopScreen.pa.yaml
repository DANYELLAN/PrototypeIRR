Screens:
  sopScreen:
    Properties:
      BackgroundImage: ='Screenshot_20221208-192313_Gallery'
      ImagePosition: =ImagePosition.Stretch
    Children:
      - cbDepart:
          Control: ComboBox@0.0.51
          Properties:
            DefaultSelectedItems: ={Id:131,Result:"All Departments"}
            Height: =40
            InputTextPlaceholder: ="Department"
            Items: |+
              =ForAll(Distinct('Standard Operating Procedures',Department.Value), {Result: ThisRecord.Value})
            Width: =297
            X: =256
            Y: =86
          Children:
            - Result2:
                Control: ComboBoxDataField@1.5.0
                Variant: textualColumn
                IsLocked: true
                Properties:
                  FieldDisplayName: ="Result"
                  FieldName: ="Result"
                  FieldType: ="s"
                  Order: =1
      - PdfViewer1:
          Control: PDFViewer@2.5.0
          Properties:
            DisplayMode: =DisplayMode.View
            Document: |+
              =Substitute(operation_sop_gal.Selected.Thumbnail.Large,"/thumbnail","/pdf")
            Height: =783
            Visible: |-
              =true
              //varSOPPDFViewer
            Width: =754
            X: =579
            Y: =17
      - pdfExitBackground:
          Control: HtmlViewer@2.1.0
          Properties:
            DisabledBorderColor: =RGBA(56, 56, 56, 1)
            Font: =Font.'Open Sans'
            Height: =147
            HtmlText: |-
              ="<div style='background: linear-gradient(90deg, rgba(140,204,237,1) 0%, rgba(168,27,34,1) 100%); 
              box-shadow: 1px 2px 22px 0px rgba(89,87,87,0.85);
              margin: 20px; 
              width: 220px; 
              height: 80px; 
              border-radius: 30px'>
              </div>"
            OnSelect: |+
              =If(varSOPPDFViewer = true && !Parent.Printing, true, false)
            Visible: |+
              =If(varSOPPDFViewer = true && !Parent.Printing, true, false)
            Width: =256
            Y: =127
      - pdfExitContainer:
          Control: GroupContainer@1.5.0
          Variant: ManualLayout
          Properties:
            DropShadow: =DropShadow.ExtraBold
            Height: =113
            Visible: |+
              =If(varSOPPDFViewer = true && !Parent.Printing, true, false)
            Width: =256
            Y: =138
      - pdfExit_1:
          Control: Button@0.0.45
          Properties:
            Appearance: ='ButtonCanvas.Appearance'.Transparent
            BasePaletteColor: =RGBA(0, 0, 0, 1)
            Font: =Font.Georgia
            FontColor: =RGBA(255, 255, 255, 1)
            FontSize: =25
            FontWeight: =FontWeight.Semibold
            Height: =65
            OnSelect: =Set(varSOPPDFViewer,false)
            Text: ="Back"
            Visible: |+
              =If(varSOPPDFViewer = true && !Parent.Printing, true, false)
            Width: =225
            X: =8
            Y: =157
      - pdfExitContainer_1:
          Control: GroupContainer@1.5.0
