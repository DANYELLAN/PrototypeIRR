      - printButton:
          Control: Classic/Icon@2.5.0
          Properties:
            DisabledBorderColor: =RGBA(255, 255, 255, 1)
            Icon: =Icon.Print
            OnSelect: =Print()
            Visible: |+
              =If(varSOPPDFViewer = true && !Parent.Printing, true, false)
            X: =102
            Y: =284
      - btnCancel_1:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(79, 90, 94, 1)
            BorderThickness: =0
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            DisabledColor: =ColorFade(Self.Color,-70%)
            DisabledFill: =ColorFade(Self.Fill,10%)
            DisplayMode: =If(IsBlank(txtCurrentBadge.Text),DisplayMode.Disabled,DisplayMode.Edit)
            Fill: =varMainFill2
            Font: =Font.'Lato Light'
            Height: =100
            HoverColor: =RGBA(255, 255, 255, 1)
            HoverFill: =ColorFade(Self.Fill, 15%)
            OnSelect: =Navigate(scrTimeSht,ScreenTransition.UnCover);Set(varAddNew,true);Set(varAddNew,false);UpdateContext({varQty:""});Set(varNumbers,!varNumbers);
            PaddingTop: =40
            PressedFill: =ColorFade(Self.Fill, 15%)
            Text: ="Cancel"
            Visible: =true//If(IsBlank(txtCurrentBadge),false,true)
            Width: =90
            Y: =117
      - icoClock_5:
