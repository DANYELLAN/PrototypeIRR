            Height: =33
            Icon: =Icon.CancelBadge
            OnSelect: =Navigate(scrTimeSht)
            Visible: =If(IsBlank(txtCurrentBadge.Text),false,true)
            Width: =32
            X: =131
            Y: =17
      - icoClock_6:
          Control: Classic/Icon@2.5.0
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            DisplayMode: =DisplayMode.View
            Height: =33
            Icon: =Icon.ArrowLeft
            OnSelect: =Navigate(scrAddNew)
            Visible: =If(IsBlank(txtCurrentBadge.Text),false,true)
            Width: =32
            X: =29
            Y: =17
      - backButton:
          Control: Classic/Button@2.2.0
          Properties:
            BorderColor: =RGBA(79, 90, 94, 1)
            BorderThickness: =0
            Color: =RGBA(255, 255, 255, 1)
            DisabledBorderColor: =RGBA(0, 0, 0, 0)
            DisabledColor: =ColorFade(Self.Color,-70%)
            DisabledFill: =ColorFade(Self.Fill,10%)
            DisplayMode: =
            Fill: =varMainFill2
            Font: =Font.'Lato Light'
            Height: =100
