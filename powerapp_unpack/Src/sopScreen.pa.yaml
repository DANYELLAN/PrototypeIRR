            DropShadow: =DropShadow.ExtraBold
            Height: =113
            Visible: |+
              =If(varSOPPDFViewer = true && !Parent.Printing, true, false)
            Width: =256
            Y: =263
      - pdfExitBackground_1:
          Control: HtmlViewer@2.1.0
          Properties:
            DisabledBorderColor: =RGBA(56, 56, 56, 1)
            Font: =Font.'Open Sans'
            Height: =147
            HtmlText: |-
              ="<div style='background: linear-gradient(90deg, rgba(140,204,237,1) 0%, rgba(168,27,34,1) 100%); 
